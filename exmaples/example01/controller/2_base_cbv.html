<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            .content {
                width: 360px;
                height: 600px;
                border-radius: 20px;
                border: 2px solid #666;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <div class="content"></div>
        <input type="text" />
        <button>send</button>
    </body>
    <script>
        const content = document.querySelector('.content');
        const input = document.querySelector('input');
        const btn = document.querySelector('button');
        const websocket = new WebSocket('http://localhost:8000/base_cbv/chat');
        const generateMessageBox = (flexDirection, message) => {
            const box = document.createElement('div');
            box.textContent = flexDirection === 'row-reverse' ? `${message} : me` : `${message}`;
            box.style.width = '100%';
            box.style.display = 'flex';
            box.style.flexDirection = flexDirection;
            box.style.backgroundColor = flexDirection === 'row-reverse' ? 'deepskyblue' : '';
            box.style.color = flexDirection === 'row-reverse' ? 'white' : 'black';
            content.appendChild(box);
        };
        websocket.onopen = () => {
            console.log('websocket open');
        };
        websocket.onmessage = (e) => {
            generateMessageBox('row', e.data);
        };
        websocket.onerror = (e) => {
            console.error(`websocket error ${e}`);
        };
        websocket.onclose = () => {
            console.log('websocket closed');
        };
        btn.addEventListener('click', () => {
            const message = input.value.trim();
            if (message) {
                generateMessageBox('row-reverse', message);
                websocket.send(message);
                input.value = '';
            }
        });
    </script>
</html>
